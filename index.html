<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小手机 Ultimate Pro</title>
    <!-- 引入样式文件 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container">
        <div class="status-bar"></div>

        <div class="home-screen">
            <div class="grid-layout">
                
                <!-- 1. Banner -->
                <div class="widget widget-banner">
                    <img id="banner-img" src="https://s3.bmp.ovh/2026/02/01/TiEzLWqk.jpg">
                    <div class="banner-controls">
                        <div class="icon-btn" onclick="triggerFile('banner')">
                            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        </div>
                        <div class="icon-btn"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                        <div class="icon-btn"><svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M21 10a9 9 0 0 0-14.8-3.4"/><path d="M3 14a9 9 0 0 0 14.8 3.4"/></svg></div>
                    </div>
                </div>

                <!-- 2. Music -->
                <div class="widget widget-music">
                    <div class="music-disc" id="musicDisc" onclick="triggerFile('music')">
                        <img id="music-cover" class="music-cover" src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
                    </div>
                    <div class="music-controls-row">
                        <div class="music-btn"><svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></div>
                        <div class="music-btn" onclick="toggleMusic()"><svg id="play-icon" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></div>
                        <div class="music-btn"><svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></div>
                    </div>
                </div>

                <!-- 3. Apps Row 1 -->
                <div class="app-cell" onclick="openApiApp()">
                    <div class="app-icon"><svg viewBox="0 0 24 24"><path d="M4 17l6-6-6-6M12 19h8M12 5h8M12 12h8"/></svg></div>
                    <span class="app-name">API</span>
                </div>
                <div class="app-cell">
                    <div class="app-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
                    <span class="app-name">外观</span>
                </div>
                
                <!-- 4. Apps Row 2 -->
                <div class="app-cell">
                    <div class="app-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
                    <span class="app-name">日历</span>
                </div>
                <div class="app-cell">
                    <div class="app-icon"><svg viewBox="0 0 24 24"><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><circle cx="12" cy="12" r="4"/></svg></div>
                    <span class="app-name">天气</span>
                </div>

                <!-- 5. Row 3 Left -->
                <div class="app-cell">
                    <div class="app-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"/></svg></div>
                    <span class="app-name">美团</span>
                </div>
                <div class="app-cell">
                    <div class="app-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="7" x2="15" y2="7"/></svg></div>
                    <span class="app-name">贴吧</span>
                </div>

                <!-- 6. Countdown Widget -->
                <div class="widget widget-countdown" id="countdownWidget" onclick="openCountdownApp()">
                    <div class="countdown-info">
                        <div class="cd-title" id="displayTitle">恋爱纪念日</div>
                        <div class="cd-date" id="displayDate">2026-02-03</div>
                    </div>
                    <div class="cd-days" id="displayDays">0<span>天</span></div>
                </div>

                <!-- 7. Text Widget -->
                <div class="widget widget-text">
                    <div class="ins-text" id="insText" contenteditable="true" onblur="saveData()">♡ ⑅ +.小猫的属性要以xx命名.+ ⑅ ♡</div>
                </div>

                <!-- 8. Row 4 Right -->
                <div class="app-cell"><div class="app-icon"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><span class="app-name">音乐</span></div>
                <div class="app-cell"><div class="app-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><span class="app-name">相册</span></div>
            </div>
        </div>

        <!-- Dock -->
        <div class="dock-container">
            <div class="app-cell"><div class="app-icon"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div></div>
            <div class="app-cell"><div class="app-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 5v3"/><path d="M10 5l2 3 2-3"/></svg></div></div>
            <div class="app-cell"><div class="app-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div></div>
        </div>

        <!-- APP: 倒数日设置 -->
        <div class="app-overlay" id="appCountdown">
            <div class="app-header">
                <div class="nav-btn" onclick="closeApp('appCountdown')">取消</div>
                <div class="app-title">倒数日</div>
                <div class="nav-btn" onclick="saveCountdown()">保存</div>
            </div>
            <div class="app-body">
                <div class="glass-panel">
                    <div class="panel-title">计算模式</div>
                    <div style="display:flex; gap:10px;">
                        <button class="glass-btn" onclick="setCdMode('up')">纪念日 (正数)</button>
                        <button class="glass-btn" onclick="setCdMode('down')">倒数日 (倒数)</button>
                    </div>
                </div>

                <div class="glass-panel">
                    <div class="panel-title">基本信息</div>
                    <input type="text" class="glass-input" id="cdTitleIn" placeholder="事件标题">
                    <input type="date" class="glass-input" id="cdDateIn">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                        <span style="font-size:14px;">字体颜色</span>
                        <input type="color" id="cdColorIn" onchange="document.getElementById('cdHexIn').value = this.value">
                        <input type="text" id="cdHexIn" class="glass-input" style="width:80px; margin:0;" value="#ffffff">
                    </div>
                </div>

                <div class="glass-panel">
                    <div class="panel-title">背景图片 & 位置调整</div>
                    <input type="url" class="glass-input" id="cdUrlIn" placeholder="输入图片链接...">
                    <button class="glass-btn" onclick="triggerFile('cd')">选择本地图片</button>
                    
                    <!-- 预览与位置调整区 -->
                    <div class="preview-container">
                        <img id="cdPreview" src="">
                    </div>
                    <div style="margin-top: 10px;">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
                            <span style="font-size:12px; width:40px;">左右</span>
                            <input type="range" class="glass-range" id="cdPosX" min="0" max="100" value="50" oninput="updatePreviewPos()">
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="font-size:12px; width:40px;">上下</span>
                            <input type="range" class="glass-range" id="cdPosY" min="0" max="100" value="50" oninput="updatePreviewPos()">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- APP: API 设置 -->
        <div class="app-overlay" id="appApi">
            <div class="app-header">
                <div class="nav-btn" onclick="closeApp('appApi')">关闭</div>
                <div class="app-title">API 设置</div>
                <div class="nav-btn" style="opacity:0"></div>
            </div>
            <div class="app-body">
                <div class="glass-panel">
                    <div class="panel-title">添加 API</div>
                    <input type="text" class="glass-input" id="apiName" placeholder="API 名称 (必填)">
                    <input type="url" class="glass-input" id="apiUrl" placeholder="API 地址 (URL)">
                    <input type="text" class="glass-input" id="apiKey" placeholder="API Key">
                    
                    <!-- 独立的毛玻璃保存按钮 -->
                    <button class="btn-save-api" onclick="addApi()">
                        保存 API 设置
                    </button>
                </div>

                <div class="glass-panel">
                    <div class="panel-title">已保存列表</div>
                    <div id="apiListContainer"></div>
                </div>
            </div>
        </div>

    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none">
    
    <!-- 引入逻辑文件 -->
    <script src="script.js"></script>
</body>
</html>
